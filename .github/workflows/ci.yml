name: ci
on: [push, pull_request]

# The benchmark itself is NOT run here — it costs money and calls the model API.
# CI verifies the harness's *integrity* instead: typecheck, unit tests, the
# task-validity gate for every skill's tasks, and the dist-in-sync check
# (measured snippet == shipped snippet). Sweeps run out-of-CI with a
# maintainer API key; their raw logs are committed.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run typecheck
      - run: npm run build-dist -- --check
      - run: npm run report -- --check
      - run: npm test
